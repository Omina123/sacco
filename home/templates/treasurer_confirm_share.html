<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Cash Shares | Eldopoly SACCO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-green: #14452F;
            --eldo-gold: #D4AF37;
            --eldo-dark: #0a261a;
            --bg-light: #f4f7f6;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            background: linear-gradient(135deg, #eef2f1 0%, #f4f7f6 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .content-card {
            background: var(--glass-bg);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(20, 69, 47, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        .brand-accent {
            width: 60px;
            height: 4px;
            background: var(--eldo-gold);
            margin: 0 auto 1.5rem;
            border-radius: 2px;
        }

        .member-info-box {
            background: #f0f4f2;
            border-left: 6px solid var(--eldo-green);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .label-text {
            font-size: 0.7rem;
            font-weight: 800;
            color: #5a7167;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 5px;
            display: block;
        }

        .member-val {
            color: var(--eldo-green);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .form-control {
            border-radius: 14px;
            padding: 14px 18px;
            border: 2px solid #e2ece8;
            font-weight: 600;
            transition: all 0.25s ease;
            background: #fff;
        }

        .form-control:focus {
            border-color: var(--eldo-gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
            outline: none;
        }

        .input-group-text {
            background: #e9eee0;
            border: 2px solid #e2ece8;
            border-right: none;
            border-radius: 14px 0 0 14px;
            font-weight: 800;
            color: var(--eldo-green);
            padding-left: 18px;
            padding-right: 18px;
        }

        .btn-gold {
            background: var(--eldo-green); /* Primary brand color */
            color: var(--eldo-gold); /* Gold accent */
            border: 2px solid var(--eldo-gold);
            font-weight: 800;
            border-radius: 14px;
            padding: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-gold:hover {
            background: var(--eldo-dark);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(10, 38, 26, 0.2);
            border-color: #fff;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--eldo-green);
            font-size: 1.2rem;
            opacity: 0.5;
        }

        .input-icon-wrapper .form-control {
            padding-left: 48px;
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: var(--eldo-green);
        }

        .form-text {
            color: #8fa39a;
            font-weight: 500;
        }

        .badge-pf {
            background: var(--eldo-green);
            color: var(--eldo-gold);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="content-card">
        <div class="brand-accent"></div>
        
        <div class="text-center mb-4">
            <div class="d-inline-block mb-3" style="color: var(--eldo-gold);">
                <i class="bi bi-shield-check fs-1"></i>
            </div>
            <h3 class="fw-800" style="color: var(--eldo-green);">Share Purchase</h3>
            <p class="text-muted small">Processing manual cash equity for members.</p>
        </div>

        <div class="member-info-box">
            <div class="row align-items-center">
                <div class="col-7">
                    <span class="label-text">Member Name</span>
                    <span class="member-val text-capitalize">jumbe caleb</span>
                </div>
                <div class="col-5 text-end">
                    <span class="label-text">PF Number</span>
                    <span class="badge-pf fw-bold">107n00028</span>
                </div>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="label-text">Transaction Amount</label>
                <div class="input-group">
                    <span class="input-group-text">KES</span>
                    <input type="number" 
                           name="amount" 
                           class="form-control" 
                           placeholder="0.00" 
                           min="1" 
                           step="0.01" 
                           required
                           style="border-radius: 0 14px 14px 0;">
                </div>
            </div>

            <div class="mb-4">
                <label class="label-text">Physical Receipt Number</label>
                <div class="input-icon-wrapper">
                    <i class="bi bi-file-earmark-text"></i>
                    <input type="text" 
                           name="receipt_no" 
                           class="form-control" 
                           placeholder="e.g. ELDO-88210" 
                           required>
                </div>
                <div class="form-text mt-2" style="font-size: 0.7rem;">
                    <i class="bi bi-info-circle me-1"></i> Required for internal treasury audit logs.
                </div>
            </div>

            <button type="submit" class="btn btn-gold" onclick="return confirm('Confirm KES payment for Caleb? This action cannot be undone.')">
                <i class="bi bi-check2-circle me-2"></i> Authorize Purchase
            </button>
        </form>

        <div class="back-link">
            <a href="{% url  'Member' %}">
                <i class="bi bi-arrow-left"></i> Return to Directory
            </a>
        </div>
    </div>

</body>
</html>
