<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Refund | Eldopoly SACCO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --eldo-deep-green: #14452F;
            --eldo-gold: #FFD700;
            --bg-light: #f8fafb;
        }
        body { background: var(--bg-light); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        .form-label { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #718096; letter-spacing: 0.05em; }
        
        .reason-checklist {
            background: #fdfdfd;
            border: 2px solid #edf2f7;
            border-radius: 20px;
            padding: 1.5rem;
        }

        .custom-check {
            padding: 12px 15px;
            border-radius: 12px;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .custom-check:hover { background: #f8fafc; border-color: #e2e8f0; }

        .form-check-input {
            width: 1.25em; height: 1.25em;
            border: 2px solid var(--eldo-deep-green);
            cursor: pointer;
        }
        .form-check-input:checked { background-color: var(--eldo-deep-green); border-color: var(--eldo-deep-green); }

        .btn-eldo {
            background: var(--eldo-deep-green); color: var(--eldo-gold);
            font-weight: 700; border-radius: 16px; padding: 16px; border: none;
            transition: 0.3s; width: 100%;
        }
        .btn-eldo:hover { background: #0e3322; transform: translateY(-2px); }

        .animate-in { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="col-xl-6 col-lg-8 mx-auto">
        <div class="glass-card animate-in">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-warning-subtle rounded-circle mb-3" style="width: 70px; height: 70px;">
                    <i class="fas fa-hand-holding-dollar fs-3 text-success"></i>
                </div>
                <h3 class="fw-bold text-eldo-deep-green">Refund Application</h3>
                <p class="text-muted">Fill out the details below to process your share withdrawal</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label">Amount Requested (KES)</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-white border-2 border-end-0 rounded-start-4 text-muted">KES</span>
                        <input type="number" name="amount" class="form-control border-2 border-start-0 rounded-end-4 fw-bold" placeholder="0.00" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label mb-3">Reason for Refund (Select all that apply)</label>
                    <div class="reason-checklist shadow-sm">
                        <div class="form-check custom-check mb-2">
                            <input class="form-check-input" type="checkbox" name="reasons" value="exit" id="chkExit">
                            <label class="form-check-label ms-2 fw-medium" for="chkExit">Full Exit from SACCO</label>
                        </div>
                        <div class="form-check custom-check mb-2">
                            <input class="form-check-input" type="checkbox" name="reasons" value="medical" id="chkMedical">
                            <label class="form-check-label ms-2 fw-medium" for="chkMedical">Medical/Emergency Expenses</label>
                        </div>
                        <div class="form-check custom-check mb-2">
                            <input class="form-check-input" type="checkbox" name="reasons" value="fees" id="chkFees">
                            <label class="form-check-label ms-2 fw-medium" for="chkFees">School Fees Payment</label>
                        </div>
                        <div class="form-check custom-check mb-0">
                            <input class="form-check-input" type="checkbox" name="reasons" value="other" id="chkOther">
                            <label class="form-check-label ms-2 fw-bold text-primary" for="chkOther">Other (Please specify below)</label>
                        </div>

                        <div id="otherInputWrapper" class="mt-4" style="display: none;">
                            <label class="small fw-bold text-muted mb-2">Detailed Reason</label>
                            <textarea name="other_details" class="form-control border-2 rounded-4 bg-light" rows="3" placeholder="Provide more details..."></textarea>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-eldo shadow-lg">
                    <i class="bi bi-send-fill me-2"></i> Submit Application
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $('#chkOther').change(function() {
        if($(this).is(':checked')) {
            $('#otherInputWrapper').slideDown(300);
            $('#otherInputWrapper textarea').prop('required', true).focus();
        } else {
            $('#otherInputWrapper').slideUp(200);
            $('#otherInputWrapper textarea').prop('required', false);
        }
    });
</script>
</body>
</html>
