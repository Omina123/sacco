<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-green: #28a745;
            --eldo-light-green: #e9f7ef;
            --eldo-white: #FFFFFF;
        }

        body {
            background-color: var(--eldo-light-green); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .registration-card {
            max-width: 800px;
            margin: auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(40, 167, 69, 0.1);
            background-color: var(--eldo-white);
            overflow: hidden;
            border: none;
        }

        .header-section {
            background: linear-gradient(135deg, #FFD700 0%, var(--eldo-gold) 50%, var(--eldo-green) 100%);
            color: var(--eldo-navy);
            padding: 40px 20px;
            text-align: center;
        }

        .poly-logo-text {
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 2rem;
        }

        /* Password Wrapper for Eye Icon */
        .pass-group {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            z-index: 10;
        }

        /* Strength Meter Styling */
        .strength-container {
            height: 5px;
            background-color: #eee;
            margin-top: 8px;
            border-radius: 10px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.4s ease;
        }

        .form-control {
            border: 2px solid #e1e5eb;
            border-radius: 10px;
            padding: 12px 18px;
        }

        .form-control:focus {
            border-color: var(--eldo-green);
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.15);
        }

        .btn-eldo {
            background: linear-gradient(to right, var(--eldo-green) 0%, #34ce57 100%);
            color: white;
            font-weight: 700;
            padding: 15px 40px;
            border: none;
            transition: 0.3s;
        }

        .btn-eldo:hover {
            color: var(--eldo-gold);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card registration-card">
        <div class="header-section">
            <h2 class="mb-0 poly-logo-text">ELDOPOLY SACCO</h2>
            <p class="mb-0 fw-bold">Secure Your Financial Future</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form method="POST" id="eldoForm" novalidate>
                {% csrf_token %}

                <div class="alert p-3 mb-5 d-flex align-items-center shadow-sm" style="background: var(--eldo-light-green); border-left: 5px solid var(--eldo-green);">
                    <i class="bi bi-info-circle-fill fs-4 me-3" style="color: var(--eldo-green);"></i>
                    <div style="color: var(--eldo-navy); font-size: 0.9rem;">
                        <strong>Step 1:</strong> Set up your login credentials. You will update your Phone, ID, and Address in the next step.
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small text-uppercase">Username</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Create username" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small text-uppercase">Email Address</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="name@domain.com" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small text-uppercase">Password</label>
                        <div class="pass-group">
                            <input type="password" name="password" id="password" class="form-control" required>
                            <i class="bi bi-eye toggle-password" id="eyeIcon"></i>
                        </div>
                        <div class="strength-container">
                            <div id="strengthBar" class="strength-bar"></div>
                        </div>
                        <small id="strengthText" class="text-muted" style="font-size: 11px;"></small>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small text-uppercase">Confirm Password</label>
                        <div class="pass-group">
                            <input type="password" name="password_confirm" id="confirm_password" class="form-control" required>
                        </div>
                        <div id="matchText" class="small mt-1"></div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <button type="submit" id="submitBtn" class="btn btn-eldo rounded-pill px-5">
                        REGISTER AS MEMBER <i class="bi bi-arrow-right-circle ms-2"></i>
                    </button>
                    <p class="mt-4 small text-muted">
                        Already a member? <a href="{% url 'login' %}" class="fw-bold text-decoration-none" style="color: var(--eldo-green); border-bottom: 2px solid var(--eldo-gold);">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
        <div style="height: 10px; background: linear-gradient(to right, var(--eldo-gold) 0%, var(--eldo-green) 100%);"></div>
    </div>
</div>

<script>
    // 1. Password Visibility (The Eye)
    const eyeIcon = document.getElementById('eyeIcon');
    const passwordInput = document.getElementById('password');

    eyeIcon.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });

    // 2. Strength Meter Logic
    passwordInput.addEventListener('input', function() {
        const val = this.value;
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');
        let score = 0;

        if (val.length >= 8) score += 30;
        if (/[A-Z]/.test(val)) score += 30;
        if (/[0-9]/.test(val)) score += 40;

        bar.style.width = score + '%';
        if (score < 40) {
            bar.style.backgroundColor = '#dc3545';
            text.innerText = "Weak";
        } else if (score < 80) {
            bar.style.backgroundColor = '#ffc107';
            text.innerText = "Fair";
        } else {
            bar.style.backgroundColor = '#28a745';
            text.innerText = "Strong Account Secured ✅";
        }
    });

    // 3. Confirm Password Match
    const confirmInput = document.getElementById('confirm_password');
    const matchText = document.getElementById('matchText');

    confirmInput.addEventListener('input', function() {
        if (this.value === passwordInput.value && this.value !== "") {
            matchText.innerText = "Passwords match ✅";
            matchText.className = "text-success small mt-1";
            this.style.borderColor = "#28a745";
        } else {
            matchText.innerText = "Passwords do not match ❌";
            matchText.className = "text-danger small mt-1";
            this.style.borderColor = "#dc3545";
        }
    });

    // 4. Loading State on Submit
    const form = document.getElementById('eldoForm');
    form.addEventListener('submit', function(e) {
        if (passwordInput.value !== confirmInput.value) {
            e.preventDefault();
            alert("Passwords must match!");
        } else {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Processing...';
            btn.disabled = true;
        }
    });
</script>

</body>
</html>
