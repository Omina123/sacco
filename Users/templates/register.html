<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-white: #FFFFFF;
        }

        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .registration-card {
            max-width: 800px;
            margin: auto;
            border: none;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(11, 31, 58, 0.15);
            border-top: 8px solid var(--eldo-gold);
            background-color: var(--eldo-white);
        }

        .header-section {
            background-color: var(--eldo-navy);
            color: var(--eldo-white);
            padding: 20px;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .section-title {
            color: var(--eldo-navy);
            border-bottom: 2px solid var(--eldo-gold);
            padding-bottom: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-eldo {
            background-color: var(--eldo-navy);
            color: var(--eldo-white);
            font-weight: bold;
            padding: 12px 30px;
            transition: 0.3s;
            border: none;
        }

        .btn-eldo:hover {
            background-color: #1a3a63;
            color: var(--eldo-gold);
            transform: translateY(-2px);
        }

        .form-label {
            color: var(--eldo-navy);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .text-gold {
            color: var(--eldo-gold) !important;
        }

        /* Styling for Django's auto-generated forms */
        input, select, textarea {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            background-clip: padding-box;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }

        input:focus {
            border-color: var(--eldo-gold);
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card registration-card">
        <div class="header-section">
            <h2 class="mb-0 poly-logo-text">ELDOPOLY SACCO</h2>
            <p class="mb-0 small text-gold">Membership Application Form</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="section-title">Account Credentials</div>
                <div class="row g-3">
                    {% for field in user_form %}
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                </div>

               
                <div class="text-center mt-5">
                    <button type="submit" class="btn btn-eldo px-5 rounded-pill shadow">REGISTER AS MEMBER</button>
                    <p class="mt-4 small text-muted">
                        Already have an account? <a href="{% url 'Login' %}" class="text-gold fw-bold text-decoration-none">Sign In</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
