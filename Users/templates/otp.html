{% if messages %}
<div class="message-container" style="max-width: 400px; margin: 20px auto -90px auto;">
    {% for message in messages %}
    <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-warning{% endif %} alert-dismissible fade show shadow-sm border-0" 
         role="alert" 
         style="background-color: #ffffff; border-left: 5px solid #FFD700 !important; color: #333; border-radius: 8px;">
        <i class="bi {% if message.tags == 'success' %}bi-check-circle-fill text-success{% else %}bi-exclamation-triangle-fill text-warning{% endif %} me-2"></i> 
        {{ message }}
        <button type="button" class="btn-close" data-bs-alert="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
</div>
{% endif %}

<div class="card p-4 shadow-lg" style="max-width: 400px; margin: 120px auto; border: none; border-top: 6px solid #FFD700; border-radius: 16px; background-color: #ffffff;">
    <div class="text-center mb-4">
        <div class="mb-3 d-inline-block p-3 rounded-circle" style="background-color: #f0f4f8;">
            <i class="bi bi-shield-lock-fill" style="font-size: 2.5rem; color: #002147;"></i>
        </div>
        <h3 class="fw-bold mt-2" style="color: #002147; letter-spacing: -0.5px;">Verify Account</h3>
        <p class="small text-muted px-3">We've sent a 6-digit verification code to your email. Enter it below to secure your access.</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <input type="text" name="otp" 
                   class="form-control text-center fw-bold otp-input" 
                   placeholder="0 0 0 0 0 0" 
                   maxlength="6" 
                   required
                   pattern="\d{6}"
                   style="font-size: 28px; letter-spacing: 8px; height: 75px; border: 2px solid #dee2e6; border-radius: 12px; color: #002147; background-color: #fcfcfc; transition: all 0.3s ease;">
        </div>
        
        <button type="submit" class="btn w-100 py-3 fw-bold shadow-sm" 
                style="background-color: #002147; border: none; color: #ffffff; font-size: 1rem; border-radius: 10px; transition: 0.3s;">
            Verify & Proceed
        </button>
    </form>
    
    <div class="text-center mt-4">
        <p class="small text-muted mb-1">Didn't receive the code?</p>
        <a href="{% url 'resend_otp' %}" class="text-decoration-none fw-bold" style="color: #002147; font-size: 0.9rem;">
            <i class="bi bi-arrow-clockwise me-1"></i>Resend New Code
        </a>
    </div>
</div>

<style>
    /* Focus effect for the OTP input */
    .otp-input:focus {
        border-color: #FFD700 !important;
        box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.25) !important;
        outline: none;
        background-color: #fff !important;
    }
    
    /* Button Hover Effect */
    .btn:hover {
        background-color: #003366 !important; /* Slightly lighter navy */
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(0, 33, 71, 0.2) !important;
    }

    body {
        background-color: #f4f7f6; /* Soft grey background for the whole page */
    }
</style>
