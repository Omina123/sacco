{% if messages %}
<div class="message-container" style="max-width: 400px; margin: 20px auto -80px auto;">
    {% for message in messages %}
    <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-warning{% endif %} alert-dismissible fade show shadow-sm border-0" 
         role="alert" 
         style="background-color: {% if message.tags == 'success' %}#d4edda{% else %}#fff3cd{% endif %}; border-left: 5px solid #FFD700 !important; color: #333;">
        <i class="bi {% if message.tags == 'success' %}bi-check-circle-fill{% else %}bi-exclamation-triangle-fill{% endif %} me-2"></i> 
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
</div>
{% endif %}

<div class="card p-4 shadow" style="max-width: 400px; margin: 100px auto; border: none; border-top: 6px solid #948532; border-radius: 12px;">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: #212529;"></i>
        <h3 class="fw-bold mt-2" style="color: #212529;">Verify Account</h3>
        <p class="small text-muted">A 6-digit verification code was sent to your email. Please enter it below to continue.</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <input type="text" name="otp" 
                   class="form-control text-center fw-bold" 
                   placeholder="· · · · · ·" 
                   maxlength="6" 
                   required
                   pattern="\d{6}"
                   style="font-size: 32px; letter-spacing: 12px; height: 70px; border: 2px solid rgb(115, 107, 16); border-radius: 8px; color: #212529; background-color: #f8f9fa;">
        </div>
        
        <button type="submit" class="btn btn-dark w-100 py-3 fw-bold shadow-sm" 
                style="background-color: #212529; border: none; color: #076e18; font-size: 1.1rem; border-radius: 8px;">
            Verify & Proceed
        </button>
    </form>
    
    <div class="text-center mt-4">
    <p class="small text-muted mb-0">Didn't receive the code?</p>
    <a href="{% url 'resend_otp' %}" class="text-decoration-none fw-bold" style="color: #10096c;">
        Resend New Code
    </a>
</div>
</div>
