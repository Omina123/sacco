<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-green: #28a745;
            --eldo-light-green: #e9f7ef;
            --eldo-white: #FFFFFF;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--eldo-light-green);
            font-family: "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        /* Floating Card */
        .login-card {
            max-width: 420px;
            margin: auto;
            border: none;
            border-radius: 24px;
            background: var(--eldo-white);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
        }

        .login-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(40, 167, 69, 0.15);
        }

        .login-header {
            background: linear-gradient(135deg, #FFD700 0%, var(--eldo-gold) 50%, var(--eldo-green) 100%);
            padding: 40px 20px;
            text-align: center;
            border-radius: 24px 24px 0 0;
        }

        .logo-circle {
            width: 75px;
            height: 75px;
            background: var(--eldo-navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--eldo-gold);
            font-weight: 800;
            margin: -38px auto 10px;
            border: 5px solid var(--eldo-white);
            position: relative;
            z-index: 15;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 2px solid #edf2f7;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--eldo-green);
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.1);
        }

        .pass-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #a0aec0;
        }

        .btn-eldo {
            background: linear-gradient(to right, var(--eldo-green), #34ce57);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--eldo-navy);
            font-weight: 600;
            text-decoration: none;
            margin-top: 8px;
        }

        .forgot-link:hover { color: var(--eldo-green); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-circle">EPC</div>
    
    <div class="card login-card">
        <div class="login-header">
            <h3 class="fw-bold mb-0" style="color:var(--eldo-navy); letter-spacing: 1px;">ELDOPOLY SACCO</h3>
            <p class="small mb-0 fw-bold opacity-75">MEMBER LOGIN</p>
        </div>

        <div class="card-body p-4 pt-5">
            <form method="POST" id="loginForm">
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small border-0 mb-3">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase text-muted">Email or PF Number</label>
                    <input type="text" name="Email" placeholder="Email or PF Number" class="form-control" required>
                </div>

                <div class="mb-2">
                    <label class="form-label small fw-bold text-uppercase text-muted">Password</label>
                    <div class="pass-wrapper">
                        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-eye toggle-password" id="eye"></i>
                    </div>
                    <a href="{% url 'password_reset' %}" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-eldo" id="submitBtn">
                    <span id="btnText">SIGN IN</span> <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Need an account? 
                    <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: var(--eldo-green); border-bottom: 2px solid var(--eldo-gold);">Register</a>
                </p>
            </div>
        </div>
        
        <div style="height: 10px; background: linear-gradient(to right, var(--eldo-gold), var(--eldo-green));"></div>
    </div>
</div>

<script>
    // 1. Eye Toggle JS
    const eye = document.getElementById('eye');
    const passInput = document.getElementById('password');

    eye.addEventListener('click', () => {
        const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passInput.setAttribute('type', type);
        eye.classList.toggle('bi-eye');
        eye.classList.toggle('bi-eye-slash');
    });

    // 2. Button Loading JS
    document.getElementById('loginForm').onsubmit = function() {
        const btnText = document.getElementById('btnText');
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';
    };

    // 3. Hover Interaction JS
    const card = document.querySelector('.login-card');
    document.querySelectorAll('.form-control').forEach(input => {
        input.addEventListener('focus', () => {
            card.style.borderColor = "var(--eldo-green)";
        });
        input.addEventListener('blur', () => {
            card.style.borderColor = "transparent";
        });
    });
</script>

</body>
</html>
