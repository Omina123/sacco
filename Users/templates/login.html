<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldopoly SACCO | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
--eldo-navy:#0B1F3A;
--eldo-gold:#D4AF37;
--eldo-white:#FFFFFF;
}

/* SILVER BACKGROUND */
body{
height:100vh;
display:flex;
align-items:center;
background: linear-gradient(135deg,#dfe3e6,#f4f6f8,#cfd4d8);
background-attachment: fixed;
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

/* LOGIN CARD */

.login-card{
max-width:420px;
margin:auto;
border:none;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
border-top:6px solid var(--eldo-gold);
backdrop-filter: blur(10px);
}

/* LOGO */

.logo-circle{
width:80px;
height:80px;
background:var(--eldo-navy);
border-radius:50%;
margin:-40px auto 20px;
display:flex;
align-items:center;
justify-content:center;
color:var(--eldo-gold);
font-weight:bold;
font-size:1.6rem;
border:4px solid var(--eldo-white);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* BUTTON */

.btn-eldo{
background:var(--eldo-navy);
color:white;
font-weight:600;
padding:12px;
transition:0.3s;
border-radius:8px;
}

.btn-eldo:hover{
background:#1a3a63;
color:var(--eldo-gold);
}

/* INPUTS */

.form-control{
border-radius:8px;
padding:10px;
}

.form-control:focus{
border-color:var(--eldo-gold);
box-shadow:0 0 6px rgba(212,175,55,0.5);
}

.form-label{
font-weight:600;
color:var(--eldo-navy);
}

.text-gold{
color:var(--eldo-gold);
}

</style>
</head>

<body>

<div class="container">

<div class="card login-card">

<div class="card-body p-4 pt-0">

<div class="logo-circle">
EPC
</div>

<div class="text-center mb-4">
<h3 class="fw-bold" style="color:var(--eldo-navy)">ELDOPOLY</h3>
<p class="text-muted small">SACCO MEMBER PORTAL</p>
</div>

<form method="POST">
{% csrf_token %}

{% if form.non_field_errors %}
<div class="alert alert-danger p-2 small">
{{ form.non_field_errors }}
</div>
{% endif %}

{% for field in form %}
<div class="mb-3">

<label class="form-label">{{ field.label }}</label>

{{ field }}

{% if field.errors %}
<div class="text-danger small">
{{ field.errors }}
</div>
{% endif %}

</div>
{% endfor %}

<button type="submit" class="btn btn-eldo w-100 mt-2">
SECURE SIGN IN
</button>

</form>

<div class="text-center mt-4">

<p class="small text-muted">
Not a member?
<a href="{% url 'register' %}" class="fw-bold text-decoration-none text-gold">
Create Account
</a>
</p>

</div>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
