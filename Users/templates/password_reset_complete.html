{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Update Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-green: #28a745;
            --eldo-light-green: #e9f7ef;
            --eldo-white: #FFFFFF;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--eldo-light-green);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-card {
            max-width: 420px;
            margin: auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(40, 167, 69, 0.1);
            background-color: var(--eldo-white);
            overflow: hidden;
            text-align: center;
            transition: 0.3s ease-in-out;
        }

        .success-header {
            background: linear-gradient(135deg, #FFD700 0%, var(--eldo-gold) 50%, var(--eldo-green) 100%);
            padding: 45px 20px;
            position: relative;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--eldo-navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--eldo-gold);
            font-weight: 800;
            font-size: 1.4rem;
            margin: 0 auto -75px;
            border: 4px solid var(--eldo-white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .success-icon-main {
            font-size: 4rem;
            color: var(--eldo-green);
            margin-bottom: 20px;
            display: inline-block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-eldo {
            background: linear-gradient(to right, var(--eldo-green) 0%, #34ce57 100%);
            color: white;
            font-weight: 700;
            padding: 14px;
            transition: 0.3s;
            border-radius: 12px;
            border: none;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            width: 100%;
        }

        .btn-eldo:hover {
            color: var(--eldo-gold);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.2);
            transform: translateY(-2px);
        }

        h3 {
            color: var(--eldo-navy);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.25rem;
        }

        p {
            color: #5a6471;
            font-size: 0.95rem;
            line-height: 1.6;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="logo-circle">EPC</div>
    
    <div class="card success-card">
        <div class="success-header">
            <h3 class="mb-0" style="color:var(--eldo-navy); opacity: 0.9;">ELDOPOLY</h3>
            <p class="small mb-0 text-dark fw-bold">SECURITY VERIFIED</p>
        </div>

        <div class="card-body p-4 pt-5">
            <div class="success-icon-main">
                <i class="bi bi-shield-check"></i>
            </div>
            
            <h3>Update Successful</h3>
            <p class="mb-4">Your credentials have been updated. You can now access your member dashboard using your new password.</p>

            <a href="{% url 'Login' %}" class="btn-eldo shadow-sm">
                PROCEED TO LOGIN <i class="bi bi-arrow-right-circle ms-2"></i>
            </a>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">
                    <i class="bi bi-lock me-1"></i> Eldopoly SACCO Management System
                </p>
            </div>
        </div>
        
        <div style="height: 8px; background: linear-gradient(to right, var(--eldo-gold) 0%, var(--eldo-green) 100%);"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
