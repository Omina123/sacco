{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-green: #28a745;
            --eldo-light-green: #e9f7ef;
            --eldo-white: #FFFFFF;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--eldo-light-green);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .reset-card {
            max-width: 420px;
            margin: auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(40, 167, 69, 0.1);
            background-color: var(--eldo-white);
            overflow: hidden;
            transition: 0.3s ease-in-out;
        }

        .reset-header {
            background: linear-gradient(135deg, #FFD700 0%, var(--eldo-gold) 50%, var(--eldo-green) 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--eldo-navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--eldo-gold);
            font-weight: 800;
            font-size: 1.4rem;
            margin: 0 auto -75px;
            border: 4px solid var(--eldo-white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .btn-eldo {
            background: linear-gradient(to right, var(--eldo-green) 0%, #34ce57 100%);
            color: white;
            font-weight: 700;
            padding: 12px;
            transition: 0.3s;
            border-radius: 10px;
            border: none;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn-eldo:hover {
            color: var(--eldo-gold);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.2);
            transform: translateY(-2px);
        }

        /* Customizing Django Form inputs to match your theme */
        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #e1e5eb;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--eldo-green);
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.1);
        }

        .form-label {
            font-weight: 700;
            color: var(--eldo-navy);
            font-size: 0.85rem;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .back-link {
            color: var(--eldo-navy);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--eldo-green);
        }

    </style>
</head>

<body>

<div class="container">
    <div class="logo-circle">EPC</div>
    
    <div class="card reset-card">
        <div class="reset-header">
            <h3 class="fw-extrabold mb-0" style="color:var(--eldo-navy); letter-spacing: 2px;">ELDOPOLY</h3>
            <p class="small mb-0 text-dark opacity-75 fw-bold">ACCOUNT RECOVERY</p>
        </div>

        <div class="card-body p-4 pt-5">
            <div class="text-center mb-4">
                <h5 class="fw-bold text-eldo-navy">Forgot Password?</h5>
                <p class="small text-muted">Enter your email address below and we'll send you a link to reset your password.</p>
            </div>

            <form method="POST">
                {% csrf_token %}

                {% if form.errors %}
                <div class="alert alert-danger p-2 small border-0 shadow-sm">
                    <i class="bi bi-exclamation-circle-fill me-2"></i> Please provide a valid email.
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    {{ form.email }}
                </div>

                <button type="submit" class="btn btn-eldo mt-2 shadow-sm">
                    SEND RESET LINK <i class="bi bi-send-fill ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="back-link">
                    <i class="bi bi-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
        
        <div style="height: 8px; background: linear-gradient(to right, var(--eldo-gold) 0%, var(--eldo-green) 100%);"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
